<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <form class="formulario">
        <label for="NomeCompleto">Nome completo:</label><br>
        <input type="text" id="NomeCompleto" name="username" required><br>

        <label for="idade">Idade:</label><br>
        <input type="number" id="idade" name="idade" min="18" max="120" required><br>

        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" placeholder="insira um e-mail válido" required><br>

        <label for="conteudo">Conteúdo de maior interesse:</label><br>
        <select id="conteudo" name="conteudo">
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="javascript" selected>JavaScript</option>
        </select><br>

        <label for="opiniao">Deixe sua opinião:</label><br>
        <textarea id="opiniao" name="opiniao" rows="5" cols="30"></textarea><br>

        <label for="senha">Senha:</label><br>
        <input type="password" id="senha" name="senha" required>

        <br> <!--quebra de linha--><br>
        <input type="submit" value="Enviar" id="botaoEnviar">
    </form>

    <p>
        Não tem certeza sobre seu e-mail? 
        <a href="https://email-checker.net/" target="_blank">
            Verificar validade do e-mail
        </a>
    </p>

    <p>

    <a id="validacao" href="https://jigsaw.w3.org/css-validator/check/referer">
        <img style="border:0;width:88px;height:31px"
            src="https://jigsaw.w3.org/css-validator/images/vcss-blue"
            alt="CSS válido!" />
    </a>
</p>
</body>
</html>
